<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login – vidaxl csrf $700</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; justify-content: center;
           align-items: center; height: 100vh; background: #f0f2f5; }
    .card { background: #fff; padding: 2rem; border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,.1); width: 340px; }
    h2 { margin-bottom: 1.2rem; color: #333; }
    label { display: block; margin-bottom: .3rem; font-size: .85rem; color: #555; }
    input  { width: 100%; padding: .6rem .8rem; margin-bottom: 1rem;
             border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
    button { width: 100%; padding: .7rem; background: #4f46e5; color: #fff;
             border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #4338ca; }
    .hint { margin-top: 1rem; font-size: .8rem; color: #888; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔐 Login</h2>
    <form method="POST" action="/login">
      <label>Username</label>
      <input type="text" name="username" placeholder="username" required />
      <label>Password</label>
      <input type="password" name="password" placeholder="password" required />
      <button type="submit">Sign In</button>
    </form>
    <p class="hint">Demo creds → alice / password123</p>
  </div>
</body>
</html>
